    <style>
        * {margin:0; padding:0; box-sizing:border-box;}
        body {font-family:Arial,sans-serif; line-height:1.6; color:#1a1a1a;}
        .container {max-width:1100px; margin:0 auto; padding:0 20px;}
        header {background:#fff; padding:15px 0; border-bottom:3px solid #0d4f6c;}
        .header-flex {display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
        .logo-svg {height:70px; width:auto;}
        .header-info {text-align:right;}
        .header-info .cible {font-size:13px; color:#0d4f6c; font-weight:700; text-transform:uppercase;}
        .header-info .tel {font-size:26px; font-weight:900; color:#e63946; text-decoration:none;}
        .hero {background:#0d4f6c; color:white; padding:80px 0; text-align:center;}
        .hero h1 {font-size:42px; margin-bottom:15px; font-weight:900;}
        .hero p {font-size:20px; margin-bottom:30px; opacity:0.9;}
        .btn {display:inline-block; background:#e63946; color:white; padding:16px 32px; text-decoration:none; border-radius:5px; font-weight:bold; font-size:18px; margin:5px;}
        .btn-blanc {background:white; color:#0d4f6c;}
        .badges {background:#f1f5f9; padding:25px 0;}
        .badges-flex {display:flex; justify-content:center; gap:30px; flex-wrap:wrap; font-weight:700; color:#0d4f6c;}
        .services {padding:70px 0;}
        .services h2 {text-align:center; font-size:36px; margin-bottom:50px; color:#0d4f6c; font-weight:900;}
        .grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px;}
        .card {border:2px solid #e2e8f0; border-radius:10px; padding:25px;}
        .card-tag {display:inline-block; background:#e8f4f8; color:#0d4f6c; padding:3px 10px; border-radius:4px; font-size:11px; font-weight:700; margin-bottom:10px; text-transform:uppercase;}
        .card h3 {color:#0d4f6c; margin-bottom:10px; font-size:20px; font-weight:800;}
        .zones {padding:60px 0; background:#f8f9fa; text-align:center;}
        .zones h2 {font-size:32px; margin-bottom:15px; color:#0d4f6c; font-weight:900;}
        .zones p {font-size:22px; font-weight:800; color:#e63946; text-transform:uppercase;}
        footer {background:#0d4f6c; color:white; padding:50px 0 25px;}
        .footer-grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:35px; margin-bottom:35px;}
        .footer-col h4 {font-size:17px; margin-bottom:15px; color:#a8dadc;}
        .footer-col p, .footer-col a {margin:8px 0; color:white; text-decoration:none; font-size:15px;}
        .footer-bottom {border-top:1px solid #1d3557; padding-top:25px; text-align:center; font-size:14px; opacity:0.8;}
        @media(max-width:768px){.hero h1{font-size:30px;} .header-flex{justify-content:center; text-align:center;} .header-info{text-align:center;}}
    </style>
