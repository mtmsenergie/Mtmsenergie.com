<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTMS ENERGIE - Plomberie Chauffage Ventilation</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box;}
        body {font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; line-height:1.6; color:#333;}
        .container {max-width:1100px; margin:0 auto; padding:0 20px;}
        header {background:#fff; padding:20px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100;}
        .header-content {display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;}
        .logo-img {height:70px; width:auto;}
        .phone {font-size:22px; font-weight:bold; color:#e63946; text-decoration:none;}
        .hero {background:linear-gradient(135deg,#1d3557 0%,#457b9d 100%); color:white; padding:80px 0; text-align:center;}
        .hero h1 {font-size:40px; margin-bottom:15px;}
        .hero p {font-size:20px; margin-bottom:30px; opacity:0.95;}
        .btn {display:inline-block; background:#e63946; color:white; padding:16px 32px; text-decoration:none; border-radius:5px; font-weight:bold; font-size:18px;}
        .services {padding:70px 0; background:#f1faee;}
        .services h2 {text-align:center; font-size:36px; margin-bottom:45px; color:#1d3557;}
        .grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:30px;}
        .card {background:white; border-radius:10px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        .card img {width:100%; height:220px; object-fit:cover;}
        .card-content {padding:25px;}
        .card h3 {color:#1d3557; margin-bottom:12px; font-size:24px;}
        .zones {padding:70px 0; text-align:center; background:white;}
        .zones h2 {font-size:36px; margin-bottom:20px; color:#1d3557;}
        .zones p {font-size:24px; margin-bottom:10px; font-weight:900; color:#e63946; text-transform:uppercase;}
        footer {background:#1d3557; color:white; padding:45px 0; text-align:center;}
        footer p {margin:8px 0;}
        @media(max-width:768px){.hero h1{font-size:30px;} .header-content{justify-content:center; text-align:center;} .logo-img{height:60px;}}
    </style>
</head>
